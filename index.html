const bar=(label,val,sub)=>`<div class="bar"><span class="bl">${label}</span><div class="track"><div class="fill" style="width:${Math.round(val*100)}%"></div></div><span class="bv">${sub}</span></div>`;

const FAIL_TH={rating_below_4_6:'เรตติ้ง < 4.6',reviews_below_100:'รีวิว < 100',untrusted_shop_weak_proof:'ร้านไม่มี badge + โซเชียลพรูฟไม่แรงพอ'};
const WARN_TH={stock_low:'สต็อกใกล้หมด',no_velocity_yet:'ยังไม่มีข้อมูลขายต่อเนื่อง (รอเก็บ snapshot รายวัน)'};
const MISS_TH={rating:'เรตติ้ง',reviews:'จำนวนรีวิว',mediaReviews:'รีวิวมีรูป/คลิป',shopType:'ประเภทร้าน (Mall/แนะนำ)',commission:'ค่าคอม'};
const TAG_TH={high_ticket:['💎 High Ticket','#7c4dff'],flash_conversion:['⚡ Flash Conversion','#ff8f1f'],evergreen:['🌳 Evergreen','#1eae62']};
const mapj=(arr,m)=>(arr||[]).map(x=>m[x]||x).join(' · ');

function renderAnalysis(){
  const s=[...DATA].sort((a,b)=>(b.eligible-a.eligible)||(b.score-a.score));
  document.getElementById('analysis').innerHTML = s.map((d,i)=>{
    const sub=d.sub||{};
    const isVel=d.sustBasis==='velocity';
    const sustLabel=isVel?'ขายต่อเนื่อง':'ดีมานด์(ยอดขาย)';
    const tags=(d.tags||[]).map(t=>{const x=TAG_TH[t]||[t,'#888'];return `<span class="tagchip" style="background:${x[1]}">${x[0]}</span>`;}).join('');
    const velTxt=(d.velPerWeek!=null)?`📈 ขายเพิ่ม ~${d.velPerWeek} ชิ้น/สัปดาห์ (เก็บข้อมูลมา ${d.velDays} วัน)`:'📈 ขายต่อเนื่อง: ยังไม่มีข้อมูล — รัน snapshot-history.ps1 ทุกวันเพื่อสะสมแนวโน้มยอดขาย';
    const priceTxt=(d.price>=150&&d.price<=590)?'โซนทอง':(d.price<150?'ถูกไป':(d.price>1500?'แพงไป':'กลางๆ'));
    return `
    <div class="arow">
      <div class="ainfo">
        <div class="atop">
          <span class="elig ${d.eligible?'ok':'no'}">${d.eligible?'✅ ผ่านเกณฑ์':'⛔ ตกเกณฑ์'}</span>
          <div class="aname">#${i+1} ${d.name}</div>
        </div>
        ${tags?`<div class="atop" style="margin:7px 0 2px">${tags}</div>`:''}
        <div class="ametrics">฿${d.price} · ลด ${d.discount}% · คอม ${d.comm}% = <b>฿${d.commBaht}/ชิ้น</b> · ขาย ${d.soldLabel||d.sold}</div>
        ${bar('คอม฿/ชิ้น',sub.comm,'฿'+d.commBaht)}
        ${bar('ราคาโดนใจ',sub.price,priceTxt)}
        ${bar(sustLabel,sub.sust,isVel?(d.velPerWeek+'/wk'):(d.soldLabel||d.sold))}
        ${bar('น่าเชื่อถือ',sub.trust,(d.rating?('★'+d.rating):'รอข้อมูล'))}
        ${bar('ส่วนลด',sub.disc,d.discount+'%')}
        <div class="note vel">${velTxt}</div>
        ${(d.fail&&d.fail.length)?`<div class="note bad">⛔ ตกเพราะ: ${mapj(d.fail,FAIL_TH)}</div>`:''}
        ${(d.warn&&d.warn.length)?`<div class="note warn">⚠️ ${mapj(d.warn,WARN_TH)}</div>`:''}
        ${(d.missing&&d.missing.length)?`<div class="note miss">📋 ข้อมูลที่ยังขาด (ดึงเพิ่มรอบหน้าให้คะแนนแม่นขึ้น): ${mapj(d.missing,MISS_TH)}</div>`:''}
      </div>
      <div class="ascore"><div class="sv">${d.score}</div><div class="sl">Smart Score</div></div>
    </div>`;}).join('');
}

function copyText(s){const t=document.createElement('textarea');t.value=s;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();t.setSelectionRange(0,999999);try{document.execCommand('copy');}catch(e){}document.body.removeChild(t);}
function flash(b,x){const o=b.textContent;b.textContent=x;setTimeout(()=>b.textContent=o,1200);}
function cp(id,b){copyText(document.getElementById(id).value);flash(b,'✓ คัดลอกแล้ว');}
function cpAll(i,b){copyText(document.getElementById('cap'+i).value+'\n\n'+document.getElementById('tag'+i).value);flash(b,'✓ คัดลอกแล้ว');}
function mark(c){localStorage.setItem('posted_'+c.dataset.id,c.checked?'1':'');c.closest('[data-card]').classList.toggle('done',c.checked);}

const beats=a=>(a||[]).map(x=>'• '+x).join('\n');
function scShopee(s){return `🎬 Shopee Video\n\nHOOK (1-2 วิแรก): ${s.hook}\n\nข้อความขึ้นจอ:\n${beats(s.onScreen)}\n\nเสียงพากย์:\n${s.voiceover}\n\nปิดท้าย (CTA): ${s.cta}`;}
function scTiktok(s){return `🎬 TikTok\n\nHOOK: ${s.hook}\n\nข้อความขึ้นจอ:\n${beats(s.onScreen)}\n\nเสียงพากย์:\n${s.voiceover}\n\nปิดท้าย (CTA): ${s.cta}\n\nแฮชแท็ก: ${s.hashtags}`;}
function scFb(s){return `🎬 Facebook Reels\n\nHOOK: ${s.hook}\n\nแคปชั่นโพสต์:\n${s.caption}\n\nคอมเมนต์แรก (ลิงก์):\n${s.firstComment}`;}

function renderPosting(){
  document.getElementById('posting').innerHTML = DATA.map((d,i)=>`
    <div class="pcard" data-card>
      <div class="pthumb">
        <img src="${d.promoImg}" alt="">
        ${d.clip?`<video class="pvid" src="${d.clip}" poster="${d.promoImg}" controls muted playsinline preload="metadata"></video>
        <a class="btn" href="${d.clip}" download>⬇️ ดาวน์โหลดคลิป 9:16</a>`:''}
      </div>
      <div class="pbody">
        <div class="ptitle">${d.name}</div>
        <div class="pmeta">฿${d.price} (-${d.discount}%) · คอม ฿${d.commBaht}/ชิ้น</div>
        <label>แคปชั่น</label><textarea readonly id="cap${i}">${d.caption}</textarea><button onclick="cp('cap${i}',this)">คัดลอกแคปชั่น</button>
        <label>แฮชแท็ก</label><textarea readonly id="tag${i}">${d.hashtags}</textarea><button onclick="cp('tag${i}',this)">คัดลอกแฮชแท็ก</button>
        <label>คอมเมนต์แรก (ลิงก์)</label><textarea readonly id="cm${i}">${d.comment}</textarea><button onclick="cp('cm${i}',this)">คัดลอกคอมเมนต์</button>
        ${d.scripts?`<details class="scripts">
          <summary>🎬 สคริปต์คลิป + เสียงพากย์ (Shopee / TikTok / FB)</summary>
          <div class="sblock"><label>Shopee Video</label><textarea readonly id="scs${i}" class="sta">${scShopee(d.scripts.shopee)}</textarea><button onclick="cp('scs${i}',this)">คัดลอกสคริปต์ Shopee</button></div>
          <div class="sblock"><label>TikTok</label><textarea readonly id="sct${i}" class="sta">${scTiktok(d.scripts.tiktok)}</textarea><button onclick="cp('sct${i}',this)">คัดลอกสคริปต์ TikTok</button></div>
          <div class="sblock"><label>Facebook Reels</label><textarea readonly id="scf${i}" class="sta">${scFb(d.scripts.fb)}</textarea><button onclick="cp('scf${i}',this)">คัดลอกสคริปต์ FB</button></div>
        </details>`:''}
        <div class="prow">
          <button class="primary" onclick="cpAll(${i},this)">📋 คัดลอกแคปชั่น+แฮชแท็ก</button>
          <a class="btn" href="${d.link}" target="_blank">🔗 เปิดสินค้า</a>
          <label class="chk"><input type="checkbox" data-id="p${d.id}" onchange="mark(this)"> โพสต์แล้ว</label>
        </div>
      </div>
    </div>`).join('');
  document.querySelectorAll('#posting input[type=checkbox]').forEach(c=>{if(localStorage.getItem('posted_'+c.dataset.id)==='1'){c.checked=true;c.closest('[data-card]').classList.add('done');}});
}

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  document.getElementById('analysis').classList.toggle('hidden',t.dataset.t!=='analysis');
  document.getElementById('posting').classList.toggle('hidden',t.dataset.t!=='posting');
});
try{document.getElementById('day').textContent='อัปเดต: '+new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})+' · '+DATA.length+' สินค้า';}catch(e){}
renderAnalysis();renderPosting();
</script>
</body>
